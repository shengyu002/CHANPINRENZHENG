<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品认证合规资料库 - 身份验证</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); text-align: center; max-width: 360px; width: 100%; }
        h2 { color: #1A4B82; margin-bottom: 8px; }
        p { color: #7A8C9E; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; border: 1px solid #eef2f5; border-radius: 8px; margin-bottom: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1A4B82; }
        button { width: 100%; padding: 12px; background: #1A4B82; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #005BAC; }
        .error { color: #C00000; font-size: 13px; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 内部资料库</h2>
        <p>请输入内部访问邀请码以继续查看资料</p>
        <input type="password" id="inviteCode" placeholder="请输入邀请码 / 密码" autofocus>
        <button onclick="checkCode()">进入资料库</button>
        <div class="error" id="errorMsg">❌ 邀请码错误，请向管理员获取</div>
    </div>

    <script>
        // ⬇️ 这里是密码，您可以随时修改它
        const CORRECT_CODE = "888888"; 

        // ⬇️ 页面加载时，检查当前浏览器会话是否已经解锁过
        if (sessionStorage.getItem("isUnlocked") === "true") {
            // 如果已经解锁过，直接跳过密码框，跳转到真实主页
            window.location.href = "main.html";
        }

        function checkCode() {
            var inputCode = document.getElementById("inviteCode").value;
            var errorMsg = document.getElementById("errorMsg");
            if (inputCode === CORRECT_CODE) {
                // ⬇️ 密码正确后，记录解锁状态
                sessionStorage.setItem("isUnlocked", "true");
                window.location.href = "main.html";
            } else {
                errorMsg.style.display = "block";
                document.getElementById("inviteCode").value = "";
            }
        }
        // 支持按回车键直接提交
        document.getElementById("inviteCode").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { checkCode(); }
        });
    </script>
</body>
</html>
